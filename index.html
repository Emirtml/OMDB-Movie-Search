<!DOCTYPE html>
<html>
<head>
    <title>OMDb Film Arama</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="text-center mb-4"> Film Arama Motoru</h2>
        <form method="POST" class="d-flex mb-4">
            <input type="text" name="movie_name" class="form-control me-2" placeholder="write movie name (Örn: Inception)..." required>
            <button type="submit" class="btn btn-primary">Ara</button>
        </form>

        {% if movie %}
            {% if movie.Response == "True" %}
                <div class="card shadow-sm p-4">
                    <div class="row">
                        <div class="col-md-4">
                            <img src="{{ movie.Poster }}" class="img-fluid rounded" alt="Afiş">
                        </div>
                        <div class="col-md-8">
                            <h3>{{ movie.Title }} ({{ movie.Year }})</h3>
                            <p><strong>Yönetmen:</strong> {{ movie.Director }}</p>
                            <p><strong>IMDB:</strong> ⭐ {{ movie.imdbRating }}</p>
                            <p><strong>Konu:</strong> {{ movie.Plot }}</p>
                        </div>
                    </div>
                </div>
            {% else %}
                <div class="alert alert-danger">film bulunamadı!</div>
            {% endif %}
        {% endif %}
    </div>
</body>
</html>
